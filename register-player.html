<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Register</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="form-container">

<h1>🎮 Player Registration</h1>

<form id="registerForm">

<input
type="text"
id="name"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">
Create Account
</button>

</form>

<p>
Already have an account?
<a href="player-login.html">Login</a>
</p>

</div>

<script type="module" src="register-player.js"></script>

</body>
</html>
