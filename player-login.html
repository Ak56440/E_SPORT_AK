<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="form-container">

<h1>🎮 Player Login</h1>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

<p>
Don't have an account?
<a href="register-player.html">
Register
</a>
</p>

</div>

<script type="module" src="player-login.js"></script>

</body>
</html>
