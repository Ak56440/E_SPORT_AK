<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🏆 eSports Legacy Admin Dashboard</h1>

<!-- Analytics -->

<div class="cards">

<div class="card">
<h3>Total Teams</h3>
<h2 id="totalTeams">0</h2>
</div>

<div class="card">
<h3>Total Tournaments</h3>
<h2 id="totalTournaments">0</h2>
</div>

<div class="card">
<h3>Approved</h3>
<h2 id="approvedTeams">0</h2>
</div>

<div class="card">
<h3>Rejected</h3>
<h2 id="rejectedTeams">0</h2>
</div>

</div>

<hr>

<h2>Create Tournament</h2>

<form id="tournamentForm">

<input type="text" id="title" placeholder="Tournament Title" required>

<input type="date" id="date" required>
  <input type="time" id="time" required>

<input type="number" id="entryFee" placeholder="Entry Fee" required>

<input type="number" id="prizePool" placeholder="Prize Pool" required>

<input type="text" id="roomId" placeholder="Room ID">

<input type="text" id="roomPassword" placeholder="Room Password">

<button type="submit">
Create Tournament
</button>

</form>

<hr>

<h2>Tournaments</h2>

<table>

<thead>

<tr>

<th>Title</th>
<th>Date</th>
<th>Entry</th>
<th>Prize</th>
<th>Action</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

<hr>

<h2>Registrations</h2>

<table>

<thead>

<tr>

<th>Team</th>
<th>Captain</th>
<th>Tournament</th>
<th>Payment</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="registrationTable"></tbody>

</table>

<hr>

<h2>Leaderboard</h2>

<form id="leaderboardForm">

<input id="lbTeamName" placeholder="Team Name" required>

<input id="lbKills" type="number" placeholder="Kills" required>

<input id="lbRank" type="number" placeholder="Rank" required>

<input id="lbPoints" type="number" placeholder="Points" required>

<button type="submit">
Save Leaderboard
</button>

</form>

<br>

<table>

<thead>

<tr>

<th>Team</th>
<th>Kills</th>
<th>Rank</th>
<th>Points</th>
<th>Delete</th>

</tr>

</thead>

<tbody id="leaderboardAdminTable"></tbody>

</table>

<br>
  <hr>

<h2>📢 Announcement</h2>

<input
    type="text"
    id="announcementInput"
    placeholder="Enter announcement">

<button id="saveAnnouncement">
    Save Announcement
</button>

<button id="logoutBtn" class="logout">
Logout
</button>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
