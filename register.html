<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Team</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">

    <h1>🏆 Team Registration</h1>

    <form id="registerForm">

        <input type="text" id="teamName" placeholder="Team Name" required>

        <input type="text" id="captainName" placeholder="Captain Name" required>

        <input type="text" id="captainUID" placeholder="Captain UID" required>

        <input type="tel" id="mobile" placeholder="Mobile Number" required>

        <input type="email" id="email" placeholder="Email Address" required>

        <select id="tournamentTitle" required>
            <option value="">Select Tournament</option>
            <option value="Squad Tournament">Squad Tournament</option>
            <option value="Duo Tournament">Duo Tournament</option>
        </select>

        <input type="text"
               id="transactionId"
               placeholder="UPI Transaction ID"
               required>

        <button type="button"
            onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSdn30HOGmouzORwFkoq7ZTLUipnU4zpbR6LorJlB8-sYepxTg/viewform?usp=header','_blank')">
            📸 Upload Payment Screenshot
        </button>

        <p style="font-size:14px;color:red;">
            After uploading the screenshot in Google Form, come back here and complete your registration.
        </p>

        <button type="submit">✅ Register Team</button>

    </form>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
